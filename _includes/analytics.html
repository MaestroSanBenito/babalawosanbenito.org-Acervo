<!-- Banner de Privacidad e Inmunidad Analítica con Contraste AAA -->
<div id="cookie-banner" style="position: fixed; bottom: 0; left: 0; width: 100%; background-color: #050505; color: #ffffff; border-top: 2px solid #444444; padding: 15px 20px; box-sizing: border-box; text-align: center; font-size: 13px; font-family: sans-serif; z-index: 9999; display: none; line-height: 1.5;">
  <span style="color: #ffffff; font-weight: 500;">Este portal utiliza herramientas analíticas bioenergéticas avanzadas para optimizar la navegación de nuestros consultantes globales. Al continuar explorando el acervo, usted acepta nuestras políticas de privacidad y protección de rastro digital.</span>
  <button onclick="acceptCookies()" style="background-color: #ffffff; color: #000000; border: none; padding: 8px 18px; margin-left: 15px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 13px; transition: background 0.2s;">Aceptar y Proceder</button>
</div>

<script>
  function checkCookieConsent() {
    if (!localStorage.getItem('cookie_consent_logia')) {
      document.getElementById('cookie-banner').style.display = 'block';
    }
  }
  function acceptCookies() {
    localStorage.setItem('cookie_consent_logia', 'accepted');
    document.getElementById('cookie-banner').style.display = 'none';
  }
  window.onload = checkCookieConsent;
</script>
