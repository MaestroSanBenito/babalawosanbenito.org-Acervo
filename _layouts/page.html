<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    {% include analytics.html %}
    <style>
        /* Estética Seria, Realista y Profesional de la Logia - Contraste Absoluto */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: #ffffff; /* Blanco puro para eliminar cualquier error en cuerpo */
            background-color: #121212; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        h1, h2, h3 { 
            color: #ffffff; 
            border-bottom: 1px solid #333333; 
            padding-bottom: 5px; 
        }
        /* Enlaces con contraste premium aprobado por WCAG AAA */
        a { 
            color: #8ab4f8; /* Azul claro de alta visibilidad para pantallas oscuras */
            text-decoration: underline; 
        }
        a:hover { 
            color: #ffffff; 
            text-decoration: none; 
        }
        pre, code { 
            background-color: #1a1a1a; 
            padding: 10px; 
            border: 1px solid #333333; 
            border-radius: 4px; 
            display: block; 
            overflow-x: auto; 
            color: #ffffff; 
        }
        blockquote { 
            border-left: 4px solid #8ab4f8; 
            padding-left: 15px; 
            color: #e8eaed; 
            font-style: italic; 
            margin: 20px 0; 
        }
        hr { 
            border: 0; 
            border-top: 1px solid #333333; 
            margin: 30px 0; 
        }
        /* Menú superior con alto contraste */
        header nav {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">Inicio</a> | 
            <a href="/quien-soy/">Quién Soy</a> | 
            <a href="/velacion/">Velación</a>
        </nav>
    </header>
    <hr>
    <main>
        {{ content }}
    </main>
    <hr>
    <footer>
        <p style="text-align: center; font-size: 13px; color: #e8eaed;">&copy; 2026 Logia Nigromante - Maestro San Benito. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
